<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OPTA · 6E→6D · ROOM‑Engine · v3.0</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:30px; }
h1 { color:#6cf; margin-bottom:25px; text-align:center; }

/* Banner */
.banner {
    background:#6cf;
    color:#000;
    padding:15px;
    text-align:center;
    font-weight:bold;
    margin-bottom:30px;
    border-radius:8px;
}

/* Grid */
.grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
}

/* Block */
.block {
    background:#111;
    border:1px solid #333;
    padding:20px;
    border-radius:8px;
}

/* Achsen-Farben */
.block[data-axis="T"] { border-color:#4cf; }
.block[data-axis="U"] { border-color:#cf4; }
.block[data-axis="H"] { border-color:#f46; }
.block[data-axis="B"] { border-color:#6f4; }
.block[data-axis="Y"] { border-color:#f64; }
.block[data-axis="Z"] { border-color:#46f; }

.block h2 {
    color:#6cf;
    margin-bottom:10px;
}

/* ROOM Content */
pre {
    background:#000;
    border-left:3px solid #6cf;
    padding:15px;
    white-space:pre-wrap;
    margin-top:10px;
}

/* Mini-Diagramme */
.diagram {
    background:#000;
    border:1px solid #333;
    padding:10px;
    margin-top:10px;
    font-size:12px;
    white-space:pre;
    color:#6cf;
}

/* Badges */
.badge {
    display:inline-block;
    padding:3px 8px;
    margin-right:5px;
    margin-top:5px;
    background:#333;
    border-radius:4px;
    font-size:11px;
}
</style>
</head>

<body>

<div class="banner">OPTA · NC² · 6E→6D · ROOM‑Engine · Version 3.0</div>

<h1>Achsen‑Index</h1>

<div class="grid" id="grid"></div>

<script>
// Achsen → Alias → ROOM-Datei
const axes = {
    "T": { alias: "A", room: "T.room" },
    "U": { alias: "W", room: "U.room" },
    "H": { alias: "Q", room: "H.room" },
    "B": { alias: "S", room: "B.room" },
    "Y": { alias: "V", room: "Y.room" },
    "Z": { alias: "X", room: "Z.room" }
};

// ROOM-Datei laden
async function loadRoom(axis, roomFile) {
    try {
        const res = await fetch(axis + "/" + roomFile);
        if (!res.ok) return "ROOM-Datei nicht gefunden.";
        return await res.text();
    } catch {
        return "ROOM konnte nicht geladen werden.";
    }
}

// Mini-Diagramme
function axisDiagram(axis) {
    return `
Achse: ${axis}
┌───────────────┐
│ IN  →  CORE → OUT │
└───────────────┘
`;
}

function optaDiagram() {
    return `
OPTA² (8)
●──●──●──●
●──●──●──●

OPTA³ (24)
◇◇◇◇◇◇◇◇
◇◇◇◇◇◇◇◇
◇◇◇◇◇◇◇◇
`;
}

function nc2Diagram() {
    return `
NC²-Matrix
[□]─[□]─[□]
 │   │   │
[□]─[□]─[□]
 │   │   │
[□]─[□]─[□]
`;
}

async function buildGrid() {
    const grid = document.getElementById("grid");

    for (const axis of Object.keys(axes)) {
        const data = axes[axis];
        const roomContent = await loadRoom(axis, data.room);

        const block = document.createElement("div");
        block.className = "block";
        block.dataset.axis = axis;

        block.innerHTML = `
            <h2>${data.alias} · Achse ${axis}</h2>

            <div class="badge">ROOM</div>
            <div class="badge">OPTA²/OPTA³</div>
            <div class="badge">NC²</div>
            <div class="badge">6E→6D</div>

            <div class="diagram">${axisDiagram(axis)}</div>
            <div class="diagram">${optaDiagram()}</div>
            <div class="diagram">${nc2Diagram()}</div>

            <pre>${roomContent}</pre>
        `;

        grid.appendChild(block);
    }
}

buildGrid();
</script>

</body>
</html>
